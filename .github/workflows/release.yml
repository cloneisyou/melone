name: Release

# Auto-update delivery is manual-only. A clone maintainer chooses latest or beta
# from the Actions UI, and can optionally mirror artifacts to the legacy S3 feed
# for the one-time migration from S3-based installed apps to public GitHub
# Releases. Each platform uploads to the SAME draft GitHub Release in
# cloneisyou/melone; the release is only made public if every matrix build
# succeeds, so a failed build never ships an update.
on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Update channel to publish'
        type: choice
        required: true
        default: beta
        options:
          - beta
          - latest
      mirror_to_s3:
        description: 'Also mirror artifacts to the legacy S3 update feed'
        type: boolean
        required: true
        default: false

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.channel }}
  cancel-in-progress: false # never abort a half-published release

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      channel: ${{ steps.v.outputs.channel }}
      prerelease: ${{ steps.v.outputs.prerelease }}
      tag: ${{ steps.v.outputs.tag }}
      mirror_to_s3: ${{ steps.v.outputs.mirror_to_s3 }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        shell: bash
        run: |
          # MAJOR.MINOR come from package.json; the patch is the global, always-
          # increasing github.run_number so every build is newer than the last.
          # A clone maintainer manually chooses `latest` or `beta` from the
          # Actions UI; merging to main never publishes by itself.
          BASE=$(node -p "require('./apps/desktop/package.json').version")
          BASE=${BASE%%-*}
          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)
          CHANNEL="${{ inputs.channel }}"
          if [ "$CHANNEL" = "latest" ]; then
            CHANNEL=latest
            PRERELEASE=false
            VERSION="${MAJOR}.${MINOR}.${GITHUB_RUN_NUMBER}"
          else
            CHANNEL=beta
            PRERELEASE=true
            VERSION="${MAJOR}.${MINOR}.${GITHUB_RUN_NUMBER}-beta"
          fi
          if [ "${{ inputs.mirror_to_s3 }}" = "true" ]; then
            MIRROR_TO_S3=true
          else
            MIRROR_TO_S3=false
          fi
          {
            echo "version=$VERSION"
            echo "channel=$CHANNEL"
            echo "prerelease=$PRERELEASE"
            echo "tag=v$VERSION"
            echo "mirror_to_s3=$MIRROR_TO_S3"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved $VERSION on channel $CHANNEL (prerelease=$PRERELEASE, mirror_to_s3=$MIRROR_TO_S3)"

      - name: Create the shared draft release
        # Pre-create ONE draft so both matrix builds upload into the SAME release.
        # Without this, mac and win each create their own draft for the same tag
        # (drafts are not deduped by tag), scattering assets across two releases.
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          gh release create "${{ steps.v.outputs.tag }}" \
            --repo cloneisyou/melone \
            --draft \
            --title "${{ steps.v.outputs.tag }}" \
            --notes "Automated ${{ steps.v.outputs.channel }} release."

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            flag: --mac --arm64
          - os: windows-latest
            flag: --win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Python daemon (PyInstaller)
        working-directory: apps/service
        shell: bash
        run: |
          pip install '.[semantic]' pyinstaller packaging
          # Collect data, binaries, and hidden imports for the installed runtime
          # dependency closure. This keeps frozen builds working when new service
          # libraries are added, including dynamic stacks such as transformers.
          PYI_COLLECT_FLAGS="$(python - <<'PY'
          from __future__ import annotations

          import importlib.metadata as md
          import re
          import sys
          from collections import deque
          from pathlib import PurePosixPath

          from packaging.markers import default_environment
          from packaging.requirements import Requirement
          from packaging.utils import canonicalize_name

          ROOT = "melone-service"
          ROOT_EXTRAS = {"", "semantic"}
          IDENTIFIER = re.compile(r"^[A-Za-z_][A-Za-z0-9_]*$")
          SKIP_TOP_LEVEL = {
              "__pycache__",
              "tests",
              "test",
              "testing",
              "docs",
              "examples",
              "example",
              "benchmarks",
          }


          def requirement_applies(requirement: Requirement, extras: set[str]) -> bool:
              if requirement.marker is None:
                  return True
              base_env = default_environment()
              for extra in extras:
                  env = dict(base_env)
                  env["extra"] = extra
                  if requirement.marker.evaluate(env):
                      return True
              return False


          def requirements_for(dist: md.Distribution, extras: set[str]) -> list[str]:
              names: list[str] = []
              for raw in dist.requires or []:
                  requirement = Requirement(raw)
                  if requirement_applies(requirement, extras):
                      names.append(requirement.name)
              return names


          def top_levels_from_dist(dist: md.Distribution) -> set[str]:
              names: set[str] = set()
              top_level = dist.read_text("top_level.txt")
              if top_level:
                  for line in top_level.splitlines():
                      name = line.strip()
                      if IDENTIFIER.match(name) and name not in SKIP_TOP_LEVEL:
                          names.add(name)
              if names:
                  return names

              for file in dist.files or []:
                  path = PurePosixPath(str(file))
                  if len(path.parts) == 1 and path.suffix == ".py":
                      candidate = path.stem
                  else:
                      candidate = path.parts[0] if path.parts else ""
                  if (
                      candidate
                      and IDENTIFIER.match(candidate)
                      and candidate not in SKIP_TOP_LEVEL
                      and not candidate.endswith((".dist-info", ".data"))
                  ):
                      names.add(candidate)
              return names


          queue = deque([(ROOT, ROOT_EXTRAS)])
          seen: set[str] = set()
          import_names: set[str] = set()
          missing: list[str] = []

          while queue:
              dist_name, extras = queue.popleft()
              key = canonicalize_name(dist_name)
              if key in seen:
                  continue
              seen.add(key)
              try:
                  dist = md.distribution(dist_name)
              except md.PackageNotFoundError:
                  missing.append(dist_name)
                  continue

              import_names.update(top_levels_from_dist(dist))
              for dependency in requirements_for(dist, extras):
                  queue.append((dependency, {""}))

          if missing:
              print(
                  "missing installed runtime distributions: " + ", ".join(sorted(missing)),
                  file=sys.stderr,
              )
              sys.exit(1)

          print(" ".join(f"--collect-all {name}" for name in sorted(import_names)))
          PY
          )"
          python -m PyInstaller --noconfirm --onedir --name melone-daemon \
            --collect-submodules melone_service \
            $PYI_COLLECT_FLAGS \
            pyinstaller/melone-daemon.py

      - name: Stage daemon into desktop resources
        shell: bash
        run: |
          rm -rf apps/desktop/resources/melone-daemon
          mkdir -p apps/desktop/resources
          cp -R apps/service/dist/melone-daemon apps/desktop/resources/melone-daemon
          # PyInstaller --collect-all copies package development payloads that are
          # not needed at runtime. PyTorch alone includes tens of thousands of
          # headers; leaving them in the .app makes macOS signing traverse a huge
          # tree and can exhaust file descriptors on GitHub's macOS runners.
          python - <<'PY'
          from __future__ import annotations

          import shutil
          from pathlib import Path

          root = Path("apps/desktop/resources/melone-daemon")
          drop_dirs = {
              "__pycache__",
              "benchmarks",
              "cmake",
              "docs",
              "examples",
              "include",
              "test",
              "tests",
              "testing",
          }
          drop_suffixes = {
              ".c",
              ".cc",
              ".cpp",
              ".cu",
              ".cuh",
              ".h",
              ".hh",
              ".hpp",
              ".ipynb",
              ".md",
              ".pxd",
              ".pyi",
              ".rst",
          }
          removed_dirs = 0
          removed_files = 0

          for path in sorted(root.rglob("*"), key=lambda p: len(p.parts), reverse=True):
              if path.is_dir() and path.name in drop_dirs:
                  shutil.rmtree(path)
                  removed_dirs += 1
              elif path.is_file() and path.suffix.lower() in drop_suffixes:
                  path.unlink()
                  removed_files += 1

          print(f"Pruned daemon bundle: {removed_dirs} dirs, {removed_files} files")
          PY

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Install & build (electron-vite)
        working-directory: apps/desktop
        # Vite inlines import.meta.env.VITE_POSTHOG_KEY at build time, so the
        # token must be present here or the packaged renderer ships without it and
        # analytics stays a no-op. The PostHog project token is a client-side key
        # (safe to embed in the bundle); absent secret → analytics simply no-ops.
        # Auto-update metadata is written by electron-builder's GitHub publish
        # provider into app-update.yml; no private feed URL or token is embedded.
        env:
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Prepare notary key (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: echo "${{ secrets.APPLE_API_KEY }}" | base64 --decode > "$RUNNER_TEMP/notary.p8"

      - name: Package & publish to draft release
        working-directory: apps/desktop
        shell: bash
        run: |
          # macOS code-signing walks the whole app bundle, and the bundled
          # PyInstaller daemon is still a large tree after pruning, so the default
          # soft fd limit (256) can be exhausted mid-sign. Raise it for this shell;
          # electron-builder + the signer inherit it. If 65536 exceeds the runner's
          # hard limit, fall back to the hard limit instead.
          if [ "$RUNNER_OS" = "macOS" ]; then
            ulimit -n 65536 2>/dev/null || ulimit -n "$(ulimit -H -n)" || true
            ulimit -n
          fi
          pnpm exec electron-builder ${{ matrix.flag }} \
            --publish always \
            -c.extraMetadata.version=${{ needs.prepare.outputs.version }} \
            -c.publish.channel=${{ needs.prepare.outputs.channel }} \
            -c.publish.releaseType=draft
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ runner.temp }}/notary.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Transitional migration path only. Existing installed apps still read the
      # authenticated legacy S3 feed, so the first release that switches packaged
      # clients to public GitHub Releases must also be mirrored to S3 once. Leave
      # mirror_to_s3=false for normal releases after that migration has landed.
      - name: Stage update artifacts for the legacy S3 feed
        if: needs.prepare.outputs.mirror_to_s3 == 'true'
        working-directory: apps/desktop
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/s3"
          shopt -s nullglob
          cp dist/*.yml dist/*.zip dist/*.zip.blockmap \
             dist/*.exe dist/*.exe.blockmap dist/*.dmg "$RUNNER_TEMP/s3/" || true
          ls -l "$RUNNER_TEMP/s3"

      - name: Upload S3 staging artifact
        if: needs.prepare.outputs.mirror_to_s3 == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: s3-${{ matrix.os }}
          path: ${{ runner.temp }}/s3
          if-no-files-found: error

  promote:
    needs: [prepare, build] # runs only if every matrix build succeeded
    runs-on: ubuntu-latest
    # id-token: write is only used when manual dispatch enables the one-time
    # legacy S3 mirror. GitHub Release writes use secrets.RELEASES_TOKEN.
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download staged update artifacts
        if: needs.prepare.outputs.mirror_to_s3 == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: s3-*
          merge-multiple: true
          path: s3-upload

      - name: Configure AWS credentials (OIDC)
        if: needs.prepare.outputs.mirror_to_s3 == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.MELONE_UPDATE_AWS_REGION }}
          role-to-assume: ${{ secrets.MELONE_UPDATE_AWS_ROLE_ARN }}

      - name: Mirror update feed to legacy S3
        if: needs.prepare.outputs.mirror_to_s3 == 'true'
        shell: bash
        run: |
          aws s3 sync s3-upload \
            "s3://${{ vars.MELONE_UPDATE_BUCKET }}/${{ needs.prepare.outputs.channel }}/" \
            --no-progress --only-show-errors

      - name: Publish the draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          gh release edit "${{ needs.prepare.outputs.tag }}" \
            --repo cloneisyou/melone \
            --draft=false \
            --prerelease=${{ needs.prepare.outputs.prerelease }} \
            --latest=${{ needs.prepare.outputs.channel == 'latest' }}
