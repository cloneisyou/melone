<!doctype html>
<!-- Default lang is en; I18nProvider syncs it on runtime locale change. -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- script-src 'unsafe-inline' is required by the dev-mode react-refresh preamble. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://us.i.posthog.com"
    />
    <link rel="icon" type="image/png" href="/melone_logo.png" />
    <title>Melone</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
